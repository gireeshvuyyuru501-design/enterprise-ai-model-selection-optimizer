services:
  postgres:
    image: postgres:17
    container_name: model-optimizer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: model_optimizer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - model_optimizer_pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d model_optimizer
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  model_optimizer_pgdata: